<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Project 1 | Connor Boyer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* This CSS ensures the game window fits perfectly */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-y: hidden; /* Prevents double scrollbars */
        }
        .game-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
        }
        .canvas-container {
            border: 2px solid var(--neon-blue);
            width: 800px; 
            height: 1000px; 
            background: #000;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div style="width: 100%; padding: 20px; background: rgba(13, 13, 18, 0.95); z-index: 10;">
        <a href="index.html" class="btn" style="border:none;">&larr; Back to Portfolio</a>
    </div>

    <div class="game-wrapper">
        
        <h1 style="color: var(--neon-blue); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;">
            Potion Master
        </h1> 
        
        <div class="canvas-container">
            <iframe src="game13_source.html" title="Game Window"></iframe>
        </div>

        <p style="color: #aaa; margin-top: 20px; font-size: 0.9rem;">
            Controls: Use Your Mouse to Play!
			Optimized for iPad
        </p>
    </div>

</body>
</html>
